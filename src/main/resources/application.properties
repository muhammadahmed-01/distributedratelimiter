spring.application.name=Distributed-Rate-Limiter

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379

jwt.signingKey=${JWT_SIGNING_KEY:change-me-in-production-use-32-chars-min!}

ratelimit.ip.limit=${RATELIMIT_IP_LIMIT:2000}
ratelimit.ip.windowSeconds=60
ratelimit.account.limit=${RATELIMIT_ACCOUNT_LIMIT:200}
ratelimit.account.windowSeconds=60
ratelimit.redis.failure-policy=FAIL_CLOSED
ratelimit.trusted-proxies=

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.distribution.percentiles-histogram.rate_limit_redis_latency_seconds=true
management.metrics.distribution.percentiles.rate_limit_redis_latency_seconds=0.95,0.99
management.endpoint.health.probes.enabled=true
management.health.redis.enabled=true
