spring.application.name=Distributed-Rate-Limiter

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=6379

jwt.signingKey=${JWT_SIGNING_KEY:change-me-in-production-use-32-chars-min!}

ratelimit.ip.limit=100
ratelimit.ip.windowSeconds=60
ratelimit.account.limit=10
ratelimit.account.windowSeconds=60
ratelimit.redis.failure-policy=FAIL_CLOSED
ratelimit.trusted-proxies=

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.endpoint.health.probes.enabled=true
management.health.redis.enabled=true
